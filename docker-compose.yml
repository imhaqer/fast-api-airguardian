services:

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
    volumes:
      - pg-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data  # for Redis to persist data

  #add health check for fastapi
  api:
    user: "${UID}:${GID}"
    build: .
    image: api
    container_name: api
    working_dir: /app
    command: poetry run uvicorn src.fast_api_airguardian.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      PYTHONPATH: /app/src
      DATABASE_URL_ASYNC: ${DATABASE_URL_ASYNC}    # async DB URL
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}      # sync DB URL for Alembic
      BASE_URL: ${BASE_URL}
      REDIS_URL: ${REDIS_URL}
      API_SECRET: ${API_SECRET}
    volumes:
      - ./:/app/
    ports:
      - "8000:8000"
    depends_on:
      - postgres
     # - redis

  worker:
    build: .
    image: worker
    container_name: worker
    working_dir: /app
    #user: "nobody:nogroup"
    command: poetry run celery -A src.fast_api_airguardian.celery worker --beat --loglevel=info
    environment:
      PYTHONPATH: /app/src
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC} 
      BASE_URL: ${BASE_URL}
      REDIS_URL: ${REDIS_URL}
      API_SECRET: ${API_SECRET}
    volumes:
      - ./:/app/
    depends_on:
      - postgres
      - redis

volumes:
  pg-data:
    name: pg-data
  redis-data:
    name: redis-data
